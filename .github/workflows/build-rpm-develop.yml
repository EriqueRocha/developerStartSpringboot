name: Build and Release .rpm

on:
  push:
    branches:
      - develop
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev rpm

      - name: Install cargo-rpm
        run: cargo install cargo-rpm

      - name: Generate Cargo.lock if missing
        run: |
          if [ ! -f Cargo.lock ]; then
            cargo generate-lockfile
          fi

      - name: Ensure rpm config exists
        run: |
          if [ ! -d rpm ]; then
            cargo rpm init
          fi

      - name: Build release
        run: cargo build --release

      - name: Build .rpm
        run: cargo rpm build

      - name: Upload .rpm artifact (sempre)
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: target/release/rpmbuild/RPMS/**/*.rpm

      #Detecta tipo quando for TAG
      - name: Detect prerelease or stable (from tag)
        if: startsWith(github.ref, 'refs/tags/')
        id: relmeta
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ -(alpha|beta|rc) ]]; then
            echo "PRERELEASE=true" >> $GITHUB_OUTPUT
            echo "RELEASE_NAME=Beta - ${TAG}" >> $GITHUB_OUTPUT
          else
            echo "PRERELEASE=false" >> $GITHUB_OUTPUT
            echo "RELEASE_NAME=Stable - ${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Generate SHA256 checksums
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        run: |
          cd target/release/rpmbuild/RPMS
          find . -name "*.rpm" -exec sh -c 'sha256sum "$1" > "$1.sha256"' _ {} \;

      #Release para TAGS semânticas
      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.relmeta.outputs.RELEASE_NAME }}
          draft: false
          prerelease: ${{ steps.relmeta.outputs.PRERELEASE }}
          files: |
            target/release/rpmbuild/RPMS/**/*.rpm
            target/release/rpmbuild/RPMS/**/*.sha256

      #release para PUSH na main (sem tag)
      - name: Create/Update Main Release (branch push)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Fedora-linux
          name: Fedora linux-Stable
          draft: false
          prerelease: false
          make_latest: true
          files: |
            target/release/rpmbuild/RPMS/**/*.rpm
            target/release/rpmbuild/RPMS/**/*.sha256